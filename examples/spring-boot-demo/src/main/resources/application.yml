server:
  port: 8080
spring:
  application:
    name: pk-auth-spring-boot-demo
  threads:
    virtual:
      enabled: true   # brief §11 — virtual threads in every adapter's HTTP server
pkauth:
  # Demo runs against the testkit's in-memory SPIs by default. In production, do NOT set
  # `dev-mode: true` — supply real CredentialRepository / UserLookup / ChallengeStore /
  # BackupCodeRepository / OtpRepository beans (e.g. via the JDBI or DynamoDB persistence module).
  dev-mode: true
  relying-party:
    id: localhost
    name: pk-auth Spring Boot demo
    origins:
      - http://localhost:8080
  jwt:
    issuer: pk-auth-demo
    audience: pk-auth-demo-clients
    # Dev-only secret; set PKAUTH_JWT_SECRET (≥ 32 bytes) in any non-dev deployment.
    secret: change-me-this-is-a-demo-secret-32b!
    token-ttl: PT1H
  ceremony:
    challenge-ttl: PT5M
logging:
  level:
    com.codeheadsystems.pkauth: INFO
    org.springframework.security: WARN
