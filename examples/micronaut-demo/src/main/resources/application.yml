micronaut:
  application:
    name: pk-auth-micronaut-demo
  server:
    port: 8080

pkauth:
  # Demo uses the LoggingEmailSender / LoggingSmsSender for the verification flows. Production
  # deployments must omit this flag and supply real EmailSender / SmsSender beans.
  dev-mode: true
  relying-party:
    id: localhost
    name: pk-auth Micronaut demo
    origins:
      - http://localhost:8080
  jwt:
    issuer: pk-auth-micronaut-demo
    audience: pk-auth-micronaut-demo-clients
    secret: change-me-in-prod-use-a-32-byte-secret!!
