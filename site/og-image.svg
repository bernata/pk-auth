<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="scan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7A1F1F" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#7A1F1F" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#7A1F1F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#F1E7CE"/>
  <!-- faint document grid -->
  <g stroke="#211C14" stroke-width="1" opacity="0.04">
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="160" y1="0" x2="160" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="320" y1="0" x2="320" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/><line x1="640" y1="0" x2="640" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- specimen seal, right -->
  <g transform="translate(940, 315)">
    <circle r="270" fill="url(#scan)"/>
    <circle r="255" fill="none" stroke="#7A1F1F" stroke-width="0.8" stroke-dasharray="3 9" opacity="0.4"/>
    <circle r="225" fill="none" stroke="#7A1F1F" stroke-width="0.8" stroke-dasharray="1 12" opacity="0.32"/>
    <path d="M0 -200 L173 -100 L173 100 L0 200 L-173 100 L-173 -100 Z" fill="none" stroke="#7A1F1F" stroke-width="2" opacity="0.55"/>
    <path d="M0 -150 L130 -75 L130 75 L0 150 L-130 75 L-130 -75 Z" fill="none" stroke="#7A1F1F" stroke-width="1" opacity="0.4"/>
    <circle r="62" fill="none" stroke="#7A1F1F" stroke-width="2" opacity="0.7"/>
    <circle r="18" fill="#7A1F1F" opacity="0.75"/>
    <g fill="#7A1F1F" opacity="0.6">
      <circle cx="0" cy="-200" r="4"/><circle cx="173" cy="-100" r="4"/><circle cx="173" cy="100" r="4"/>
      <circle cx="0" cy="200" r="4"/><circle cx="-173" cy="100" r="4"/><circle cx="-173" cy="-100" r="4"/>
    </g>
  </g>

  <!-- accent rule -->
  <rect x="80" y="150" width="96" height="6" fill="#7A1F1F"/>

  <!-- wordmark eyebrow -->
  <text x="80" y="135" font-family="Georgia, serif" font-size="22" letter-spacing="6" fill="#756449">PK-AUTH &#183; WEBAUTHN ON THE JVM</text>

  <!-- headline -->
  <text x="80" y="240" font-family="Georgia, serif" font-size="78" fill="#211C14">Passkey-first</text>
  <text x="80" y="328" font-family="Georgia, serif" font-size="78" fill="#211C14">authentication,</text>
  <text x="80" y="416" font-family="Georgia, serif" font-size="78" font-style="italic" fill="#7A1F1F">on the JVM.</text>

  <!-- subline -->
  <text x="80" y="486" font-family="Georgia, serif" font-size="28" fill="#3C332A">A drop-in WebAuthn credential layer &#8212; not a hosted IdP.</text>

  <!-- framework chips -->
  <g font-family="monospace" font-size="20" fill="#756449">
    <text x="80" y="548">Spring Boot 4</text>
    <text x="300" y="548">&#183;  Dropwizard 5</text>
    <text x="560" y="548">&#183;  Micronaut 4</text>
  </g>
  <g font-family="monospace" font-size="18" fill="#A06D1E">
    <text x="80" y="588">v1.3.1   &#183;   JDK 21   &#183;   MIT   &#183;   github.com/codeheadsystems/pk-auth</text>
  </g>
