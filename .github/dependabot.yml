# Dependabot configuration for pk-auth.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# A single root `gradle` entry covers the whole multi-project build, including build-logic and
# example apps. The `npm` entries cover the published browser SDK and each demo's Playwright
# e2e suite — these run in CI and on developer machines, so they are part of the supply chain.

version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      dev-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
    ignore:
      # Spotless 8.x's google-java-format integration intermittently fails to load Guava / GJF
      # classes (NoClassDefFoundError on Newlines / ImmutableList$*) on Gradle 9 / JDK 21. Pin
      # to 7.x until upstream fixes. The Gradle plugin marker artifact uses the plugin id, not
      # the implementation artifact id, so this is the right Dependabot dependency-name.
      - dependency-name: "com.diffplug.spotless:com.diffplug.spotless.gradle.plugin"
        versions: [">=8"]
      # Micronaut 5.x requires JVM 25; the project targets Java 21 (brief §3). Stay on the 4.x
      # line until the JDK baseline moves.
      - dependency-name: "io.micronaut:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "io.micronaut.test:*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directories:
      - "/clients/passkeys-browser"
      - "/examples/spring-boot-demo/e2e"
      - "/examples/dropwizard-demo/e2e"
      - "/examples/micronaut-demo/e2e"
    schedule:
      interval: "daily"
    groups:
      npm-dependencies:
        applies-to: version-updates
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      gh-actions:
        applies-to: version-updates
        patterns:
          - "*"
