# Dependabot configuration for pk-auth.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Ecosystems are added as the corresponding directories land in later phases:
#   - `npm` for clients/passkeys-browser  (Phase 11)
#   - additional `gradle` directories are not needed — a single root entry covers the whole
#     multi-project build, including build-logic and example apps.

version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      dev-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
    ignore:
      # Spotless 8.x's google-java-format integration fails on Gradle 9 / JDK 21 with
      # `NoClassDefFoundError com/google/common/collect/ImmutableList$SubList` and
      # `Could not initialize class com.google.googlejavaformat.Newlines`. Stay on the 7.x line
      # until upstream resolves; remove this ignore once 8.x builds cleanly here.
      - dependency-name: "com.diffplug.spotless:spotless-plugin-gradle"
        versions: [">=8"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      gh-actions:
        applies-to: version-updates
        patterns:
          - "*"
